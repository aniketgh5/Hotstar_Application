name: Java CI/CD with Nexus and Tomcat

on:
  push:
    branches:
      - main

jobs:
  build-deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Create Maven settings.xml
        run: |
          mkdir -p ~/.m2

          cat > ~/.m2/settings.xml <<EOF
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0
                                        https://maven.apache.org/xsd/settings-1.0.0.xsd">

            <servers>

              <server>
                <id>maven-releases</id>
                <username>${{ secrets.NEXUS_USERNAME }}</username>
                <password>${{ secrets.NEXUS_PASSWORD }}</password>
              </server>

              <server>
                <id>maven-snapshots</id>
                <username>${{ secrets.NEXUS_USERNAME }}</username>
                <password>${{ secrets.NEXUS_PASSWORD }}</password>
              </server>

            </servers>

          </settings>
          EOF

      - name: Compile
        run: mvn clean compile

      - name: Run Unit Tests
        run: mvn test

      - name: Package Application
        run: mvn package

      - name: Deploy Artifact to Nexus
        run: mvn deploy

      - name: Deploy Latest Snapshot to Tomcat
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |

            set -e

            echo "=============================="
            echo "Stopping Tomcat"
            echo "=============================="

            sudo systemctl stop tomcat10

            echo "=============================="
            echo "Cleaning old deployment"
            echo "=============================="

            sudo rm -rf /var/lib/tomcat10/webapps/myapp
            sudo rm -f /var/lib/tomcat10/webapps/myapp.war

            echo "=============================="
            echo "Finding latest Snapshot"
            echo "=============================="

            DOWNLOAD_URL=$(curl -s \
              -u "${{ secrets.NEXUS_USERNAME }}:${{ secrets.NEXUS_PASSWORD }}" \
              "http://localhost:8081/service/rest/v1/search?repository=maven-snapshots&group=in.aniket&name=myapp" \
              | jq -r '
                  .items
                  | sort_by(.version)
                  | last
                  | .assets[]
                  | select(.downloadUrl | endswith(".war"))
                  | .downloadUrl
              ')

            echo "Latest Artifact:"
            echo "$DOWNLOAD_URL"

            echo "=============================="
            echo "Downloading WAR"
            echo "=============================="

            curl -L \
              -u "${{ secrets.NEXUS_USERNAME }}:${{ secrets.NEXUS_PASSWORD }}" \
              -o /tmp/myapp.war \
              "$DOWNLOAD_URL"

            sudo mv /tmp/myapp.war /var/lib/tomcat10/webapps/myapp.war

            echo "=============================="
            echo "Starting Tomcat"
            echo "=============================="

            sudo systemctl start tomcat10

            echo "Waiting for deployment..."

            sleep 20

            echo "=============================="
            echo "Deployment Status"
            echo "=============================="

            ls -l /var/lib/tomcat10/webapps/

            echo "=============================="
            echo "Health Check"
            echo "=============================="

            curl -I http://localhost:8080/myapp
